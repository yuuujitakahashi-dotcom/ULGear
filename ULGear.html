<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>山岳ギア管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
:root {
  --primary: #c8b99a;
  --on-primary: #1a1510;
  --primary-container: #2a2318;
  --on-primary-container: #d9cbb0;
  --secondary-container: #252018;
  --on-secondary-container: #c2b49a;
  --error: #cf6679;
  --bg: #0d0d0d;
  --surface: #141414;
  --surface-1: #1a1a1a;
  --surface-2: #202020;
  --surface-3: #272727;
  --on-surface: #e6e0d8;
  --on-surface-v: #8a8278;
  --outline: #3d3830;
  --outline-v: #252018;
  --e1: 0 1px 2px rgba(0,0,0,.5),0 1px 3px 1px rgba(0,0,0,.35);
  --e2: 0 1px 2px rgba(0,0,0,.5),0 2px 6px 2px rgba(0,0,0,.35);
  --e3: 0 1px 3px rgba(0,0,0,.5),0 4px 8px 3px rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--on-surface);font-family:'Noto Sans JP',sans-serif;min-height:100vh;font-size:14px}

/* ── Top bar ── */
.top-bar{
  background:var(--surface-1);height:64px;padding:0 16px;
  display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:40;box-shadow:var(--e1);
}
.top-bar-title{font-family:'Google Sans',sans-serif;font-size:22px;font-weight:400;flex:1}
.icon-btn{
  width:48px;height:48px;border-radius:50%;border:none;background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--on-surface-v);transition:background .2s;
}
.icon-btn:hover{background:rgba(255,255,255,.08)}
.icon-btn .material-icons-round{font-size:22px}

/* ── Layout ── */
.page{max-width:600px;margin:0 auto;padding:16px 16px 100px}

/* ── Search card (hero) ── */
.search-hero{
  background:var(--surface);border-radius:28px;
  box-shadow:var(--e2);margin-bottom:20px;overflow:visible;
  position:relative;z-index:30;
}
.search-inner{padding:16px 16px 0}
.search-row{
  display:flex;align-items:center;gap:10px;
  background:var(--surface-1);border:2px solid var(--outline-v);
  border-radius:28px;padding:0 14px 0 18px;height:52px;
  transition:border-color .2s,border-radius .15s;
}
.search-row.open{border-radius:14px 14px 0 0;border-color:var(--primary);border-bottom-color:var(--outline-v)}
.search-row:focus-within:not(.open){border-color:var(--primary)}
.search-row input{
  flex:1;border:none;background:transparent;font-size:16px;
  font-family:inherit;color:var(--on-surface);outline:none;
}
.search-row input::placeholder{color:var(--on-surface-v)}
.search-row .material-icons-round{font-size:20px;color:var(--primary);flex-shrink:0}
.spin-icon{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Dropdown */
.predict-drop{
  background:var(--surface);
  border:2px solid var(--primary);border-top:none;
  border-radius:0 0 14px 14px;
  box-shadow:0 8px 16px rgba(0,0,0,.12);
  overflow:hidden;display:none;
}
.predict-drop.open{display:block;animation:dropIn .15s ease both}
@keyframes dropIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

.predict-item{
  display:flex;align-items:center;gap:12px;padding:12px 14px;
  border-bottom:1px solid var(--outline-v);cursor:pointer;transition:background .1s;
}
.predict-item:last-child{border-bottom:none}
.predict-item:hover,.predict-item.focused{background:var(--surface-2)}
.predict-item.added{background:rgba(200,185,154,.06)}
.p-icon{width:52px;height:52px;border-radius:10px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden;border:1px solid var(--outline-v)}
.p-icon img{width:100%;height:100%;object-fit:cover;border-radius:9px}
.p-icon.loading{animation:sh 1.4s infinite}
.p-body{flex:1;min-width:0}
.p-name{font-size:14px;font-weight:600;color:var(--on-surface);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.p-name .hl{color:var(--primary);font-weight:700}
.p-chips{display:flex;gap:5px;margin-top:3px;flex-wrap:wrap}
.p-chip{
  font-size:11px;font-weight:600;padding:2px 7px;border-radius:999px;
  background:var(--secondary-container);color:var(--on-secondary-container);
  display:flex;align-items:center;gap:2px;
}
.p-chip .material-icons-round{font-size:11px}
.p-add{
  width:32px;height:32px;border-radius:50%;border:none;
  background:var(--primary-container);color:var(--on-primary-container);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .15s;
}
.p-add:hover{background:var(--primary);color:#fff}
.p-add.done{background:var(--primary);color:#fff;pointer-events:none}
.p-add .material-icons-round{font-size:18px}

/* Shimmer */
.shimmer-row{padding:12px 14px;border-bottom:1px solid var(--outline-v);display:flex;gap:12px;align-items:center}
.shimmer{border-radius:8px;background:linear-gradient(90deg,var(--surface-2) 25%,var(--surface-3) 50%,var(--surface-2) 75%);background-size:200% 100%;animation:sh 1.4s infinite}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
/* Search hint */
.search-hint{
  padding:8px 18px 14px;font-size:12px;color:var(--on-surface-v);
  display:flex;align-items:center;gap:4px;
}
.search-hint .material-icons-round{font-size:14px;color:var(--primary)}

/* ── Stats row ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--surface-1);border-radius:16px;padding:14px 10px;text-align:center;box-shadow:var(--e1)}
.stat-num{font-family:'Google Sans',sans-serif;font-size:26px;font-weight:700;color:var(--primary);line-height:1}
.stat-lbl{font-size:11px;color:var(--on-surface-v);margin-top:4px}

/* ── Section header ── */
.sec-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:4px 2px 10px;
}
.sec-title{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--on-surface-v)}
.sec-count{font-size:12px;color:var(--outline);font-weight:500}

/* ── Category group ── */
.cat-group{margin-bottom:8px;overflow:hidden}
.cat-group-header{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;background:var(--surface-1);
  cursor:pointer;user-select:none;
  border-radius:14px 14px 0 0;
  border:1px solid var(--outline-v);border-bottom:none;
  transition:background .15s;
}
.cat-group-header:hover{background:var(--surface-2)}
.cat-group-header.collapsed{border-radius:14px;border-bottom:1px solid var(--outline-v)}
.cat-badge{
  width:36px;height:36px;border-radius:10px;background:var(--primary-container);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;
}
.cat-info{flex:1}
.cat-name{font-size:14px;font-weight:700;color:var(--on-surface)}
.cat-sub{font-size:12px;color:var(--on-surface-v);margin-top:1px}
.cat-total{
  font-size:13px;font-weight:700;color:var(--primary);
  background:var(--primary-container);border-radius:999px;padding:3px 10px;
}
.cat-chevron{color:var(--on-surface-v);font-size:20px;transition:transform .2s}
.cat-group-header.collapsed .cat-chevron{transform:rotate(-90deg)}

.gear-list-wrap{
  border:1px solid var(--outline-v);border-top:none;
  border-radius:0 0 14px 14px;overflow:hidden;
}

/* ── Gear list item ── */
.gear-row{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;border-bottom:1px solid var(--outline-v);
  background:var(--surface);transition:background .1s;
  animation:slideIn .25s ease both;
}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.gear-row:last-child{border-bottom:none}
.gear-row:hover{background:var(--surface-2)}
.gear-row-body{flex:1;min-width:0}
.gear-row-name{font-size:15px;font-weight:500;color:var(--on-surface);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gear-row-note{font-size:12px;color:var(--on-surface-v);margin-top:2px}
.gear-row-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.weight-pill{
  background:var(--primary-container);color:var(--on-primary-container);
  border-radius:999px;padding:2px 10px;font-size:12px;font-weight:700;
}
.row-actions{display:flex;gap:2px}
.sm-btn{
  height:32px;padding:0 10px;border-radius:999px;border:none;
  background:transparent;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;transition:background .15s;
}
.sm-btn.edit{color:var(--primary)}
.sm-btn.edit:hover{background:rgba(200,185,154,.1)}
.sm-btn.del{color:var(--error)}
.sm-btn.del:hover{background:rgba(207,102,121,.1)}

/* ── Empty state ── */
.empty-state{text-align:center;padding:40px 16px;color:var(--on-surface-v)}
.empty-state .material-icons-round{font-size:48px;color:var(--outline-v);display:block;margin-bottom:12px}
.empty-state p{font-size:14px;line-height:1.7}

/* ── Bottom nav ── */
.nav-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface-2);display:flex;justify-content:space-around;
  padding:10px 0 14px;box-shadow:0 -1px 0 var(--outline-v),var(--e2);z-index:40;
}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;min-width:64px;border:none;background:transparent;font-family:inherit;padding:0}
.nav-ind{width:64px;height:32px;border-radius:999px;display:flex;align-items:center;justify-content:center;transition:background .2s}
.nav-item.active .nav-ind{background:var(--secondary-container)}
.nav-item .material-icons-round{font-size:22px;color:var(--on-surface-v);transition:color .2s}
.nav-item.active .material-icons-round{color:var(--on-secondary-container)}
.nav-lbl{font-size:12px;color:var(--on-surface-v);transition:color .2s;font-weight:500}
.nav-item.active .nav-lbl{color:var(--on-secondary-container);font-weight:700}

/* ── Panels ── */
.panel{display:none}
.panel.active{display:block;animation:fadeUp .3s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── Trip panel ── */
.trip-hero{
  background:linear-gradient(135deg,#1e1a12 0%,#2a2418 100%);border-radius:28px;
  padding:20px 20px 24px;color:var(--on-primary-container);margin-bottom:16px;
  position:relative;overflow:hidden;border:1px solid var(--outline);
}
.trip-hero::after{content:'terrain';font-family:'Material Icons Round';position:absolute;right:16px;bottom:-8px;font-size:80px;opacity:.12}
.trip-title{font-family:'Google Sans',sans-serif;font-size:22px;font-weight:500;margin-bottom:4px}
.trip-sub{font-size:13px;opacity:.8}
.weight-display{display:flex;align-items:baseline;gap:4px;margin-top:14px}
.weight-big{font-family:'Google Sans',sans-serif;font-size:38px;font-weight:700;line-height:1}
.weight-unit{font-size:15px;opacity:.8}

.check-card{background:var(--surface);border-radius:14px;box-shadow:var(--e1);overflow:hidden;margin-bottom:12px}
.check-cat-hdr{
  padding:10px 14px 4px;font-size:11px;font-weight:700;letter-spacing:.08em;
  color:var(--primary);text-transform:uppercase;
  background:var(--surface-1);border-bottom:1px solid var(--outline-v);
  display:flex;align-items:center;gap:6px;
}
.check-row{
  display:flex;align-items:center;gap:14px;padding:12px 14px;
  border-bottom:1px solid var(--outline-v);cursor:pointer;transition:background .1s;
}
.check-row:last-child{border-bottom:none}
.check-row:hover{background:var(--surface-2)}
.check-row.checked{background:rgba(200,185,154,.05)}
.check-row.checked .check-name{text-decoration:line-through;color:var(--on-surface-v)}
.checkbox{width:18px;height:18px;border-radius:3px;border:2px solid var(--outline);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.check-row.checked .checkbox{background:var(--primary);border-color:var(--primary)}
.checkbox .material-icons-round{font-size:13px;color:#fff;display:none}
.check-row.checked .checkbox .material-icons-round{display:block}
.check-name{flex:1;font-size:15px}
.check-wt{font-size:13px;color:var(--on-surface-v)}

.breakdown{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.bd-chip{background:var(--surface-2);border-radius:8px;padding:6px 12px;font-size:12px;display:flex;align-items:center;gap:5px}
.bd-wt{font-weight:700;color:var(--primary)}

/* ── Dialog ── */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.32);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.scrim.open{opacity:1;pointer-events:all}
.dialog{background:var(--surface-3);border-radius:28px;width:100%;max-width:420px;padding:24px;transform:scale(.93);transition:transform .2s;box-shadow:var(--e3)}
.scrim.open .dialog{transform:scale(1)}
.dialog-title{font-family:'Google Sans',sans-serif;font-size:22px;font-weight:400;margin-bottom:20px}
.dialog-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}

/* ── Text field ── */
.tf{position:relative;margin-bottom:18px}
.tf input,.tf select{
  width:100%;height:54px;border:none;border-bottom:1px solid var(--outline);
  border-radius:4px 4px 0 0;background:var(--surface-2);
  padding:22px 14px 8px;font-size:15px;font-family:inherit;color:var(--on-surface);
  outline:none;transition:border-color .2s;appearance:none;
}
.tf input:focus,.tf select:focus{border-bottom:2px solid var(--primary)}
.tf label{position:absolute;left:14px;top:8px;font-size:11px;color:var(--on-surface-v);pointer-events:none}
.tf.focused label,.tf.hv label{color:var(--primary)}
.tf select option{background:var(--surface)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ── Buttons ── */
.btn-filled{height:40px;padding:0 22px;border-radius:999px;border:none;background:var(--primary);color:#fff;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn-filled:hover{filter:brightness(1.08);box-shadow:var(--e2)}
.btn-text{height:40px;padding:0 12px;border-radius:999px;border:none;background:transparent;color:var(--primary);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:background .15s;display:inline-flex;align-items:center;gap:4px}
.btn-text:hover{background:rgba(200,185,154,.1)}
.btn-text.danger{color:var(--error)}
.btn-text.danger:hover{background:rgba(207,102,121,.1)}

/* ── Snackbar ── */
.snackbar{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(8px);background:#e4e9de;color:#0d0d0d;padding:13px 20px;border-radius:4px;font-size:14px;font-weight:600;box-shadow:var(--e3);z-index:100;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.snackbar.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">
  <div class="top-bar-title" style="font-family:'Google Sans',sans-serif;font-size:20px;font-weight:300;letter-spacing:.5px;color:#ffffff">
    UL Gear
  </div>
</div>

<!-- Main content -->
<div class="page">

  <!-- ══ HOME PANEL ══ -->
  <div class="panel active" id="panel-home">

    <!-- Search hero -->
    <div class="search-hero">
      <div class="search-inner">
        <div class="search-row" id="searchRow">
          <span class="material-icons-round" id="searchLeadIcon">auto_awesome</span>
          <input type="text" id="searchInput" placeholder="ギアを検索して追加…"
            autocomplete="off"
            oninput="onInput(this.value)"
            onkeydown="onKeydown(event)"
            onfocus="onFocus()"
            onblur="onBlur()">
        </div>
        <div class="predict-drop" id="predictDrop"></div>
      </div>
      <div class="search-hint">
        <span class="material-icons-round">tips_and_updates</span>
        2文字以上でAIが商品候補を提案します
      </div>
    </div>

    <!-- Stats -->
    <div style="display:flex;align-items:baseline;gap:6px;padding:4px 4px 20px">
      <span style="font-family:'Google Sans',sans-serif;font-size:32px;font-weight:700;color:#ffffff;line-height:1" id="statKg">0.0</span>
      <span style="font-size:14px;color:var(--on-surface-v);font-weight:500">kg total</span>
    </div>

    <!-- Gear list by category -->
    <div class="sec-header">
      <div class="sec-title">登録ギア</div>
      <div class="sec-count" id="secCount"></div>
    </div>
    <div id="gearByCat"></div>

  </div><!-- /home -->

  <!-- ══ TRIP PANEL ══ -->
  <div class="panel" id="panel-trip">
    <div class="trip-hero">
      <div class="trip-title">山行チェックリスト</div>
      <div class="trip-sub">チェックしたギアの合計重量</div>
      <div class="weight-display">
        <span class="weight-big" id="tripTotalG">0</span>
        <span class="weight-unit">g</span>
        <span style="font-size:13px;opacity:.65;margin-left:8px" id="tripTotalKg"></span>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--on-surface-v)">持ち物</div>
      <button class="btn-text" onclick="clearChecks()" style="font-size:13px">
        <span class="material-icons-round" style="font-size:15px">restart_alt</span>リセット
      </button>
    </div>
    <div id="tripList"></div>
    <div style="font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--on-surface-v);margin:16px 0 10px">カテゴリ別</div>
    <div class="breakdown" id="breakdown"></div>
  </div>

</div><!-- /page -->

<!-- Bottom nav (2 tabs) -->
<nav class="nav-bar">
  <button class="nav-item active" id="nav-home" onclick="switchTab('home')">
    <div class="nav-ind"><span class="material-icons-round">home</span></div>
    <span class="nav-lbl">ホーム</span>
  </button>
  <button class="nav-item" id="nav-trip" onclick="switchTab('trip')">
    <div class="nav-ind"><span class="material-icons-round">checklist</span></div>
    <span class="nav-lbl">山行</span>
  </button>
</nav>

<!-- Edit Dialog -->
<div class="scrim" id="editScrim">
  <div class="dialog">
    <div class="dialog-title">ギアを編集</div>
    <input type="hidden" id="editId">
    <div class="tf" id="etf-name"><input type="text" id="eName" placeholder=" " oninput="tfInput(this)"><label>ギア名</label></div>
    <div class="tf" id="etf-cat">
      <select id="eCat" onchange="tfInput(this)">
        <option value="">選択</option>
        <option value="Sleep">😴 Sleep</option>
        <option value="Cook">🍳 Cook</option>
        <option value="Backpack">🎒 Backpack</option>
        <option value="Clothing">👕 Clothing</option>
        <option value="Footwear">👟 Footwear</option>
        <option value="Navigation">🧭 Navigation</option>
        <option value="Safety">🩹 Safety</option>
        <option value="Food">🍱 Food & Water</option>
        <option value="Light">🔦 Light</option>
        <option value="Other">📦 Other</option>
      </select>
      <label>カテゴリ</label>
    </div>
    <div class="field-row">
      <div class="tf"><input type="number" id="eWeight" placeholder=" " min="0" oninput="tfInput(this)"><label>重量 (g)</label></div>
      <div class="tf"><input type="text" id="eNote" placeholder=" " oninput="tfInput(this)"><label>メモ</label></div>
    </div>
    <div class="dialog-actions">
      <button class="btn-text" onclick="closeEdit()">キャンセル</button>
      <button class="btn-filled" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<div class="snackbar" id="snackbar"></div>

<script>
const CAT_ICONS = {
  Sleep:'😴', Cook:'🍳', Backpack:'🎒', Clothing:'👕', Footwear:'👟',
  Navigation:'🧭', Safety:'🩹', Food:'🍱', Light:'🔦', Other:'📦'
};
const CAT_LABELS = {
  Sleep:'Sleep', Cook:'Cook', Backpack:'Backpack', Clothing:'Clothing',
  Footwear:'Footwear', Navigation:'Navigation', Safety:'Safety',
  Food:'Food & Water', Light:'Light', Other:'Other'
};

// Map Japanese AI category names → English keys
const CAT_MAP = {
  '服装':'Clothing','シューズ':'Footwear','バックパック':'Backpack',
  'テント・シュラフ':'Sleep','調理道具':'Cook','食料・水':'Food',
  '安全・救急':'Safety','ナビゲーション':'Navigation','照明':'Light','その他':'Other'
};

let gears = [];
let checkedIds = new Set();
let collapsedCats = new Set();

// ── Text field helpers ──
function tfInput(el) {
  el.closest('.tf').classList.toggle('hv', el.value !== '');
}
document.querySelectorAll('.tf input,.tf select').forEach(el => {
  el.addEventListener('focus', () => el.closest('.tf').classList.add('focused'));
  el.addEventListener('blur',  () => el.closest('.tf').classList.remove('focused'));
});

// ── Tab switch ──
function switchTab(tab) {
  ['home','trip'].forEach(t => {
    document.getElementById('panel-'+t).classList.toggle('active', t===tab);
    document.getElementById('nav-'+t).classList.toggle('active', t===tab);
  });
  if (tab==='trip') renderTrip();
}

// ── Stats ──
function updateStats() {
  const total = gears.reduce((s,g)=>s+g.weight,0);
  document.getElementById('statKg').textContent = (total/1000).toFixed(1);
  const cnt = document.getElementById('secCount');
  cnt.textContent = gears.length > 0 ? gears.length+'件' : '';
}

// ── Render gear list by category ──
function renderHome() {
  const container = document.getElementById('gearByCat');
  if (gears.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <span class="material-icons-round">backpack</span>
      <p>まだギアが登録されていません<br>上の検索欄から追加しましょう</p>
    </div>`;
    return;
  }

  // Group by category
  const bycat = {};
  gears.forEach(g => {
    if (!bycat[g.cat]) bycat[g.cat] = [];
    bycat[g.cat].push(g);
  });

  container.innerHTML = Object.entries(bycat).map(([cat, items]) => {
    const catTotal = items.reduce((s,g)=>s+g.weight, 0);
    const icon = CAT_ICONS[cat] || '📦';
    const label = CAT_LABELS[cat] || cat;
    const collapsed = collapsedCats.has(cat);

    return `
    <div class="cat-group" id="catg-${cat}">
      <div class="cat-group-header ${collapsed?'collapsed':''}" onclick="toggleCat('${cat}')">
        <div class="cat-badge">${icon}</div>
        <div class="cat-info">
          <div class="cat-name">${label}</div>
          <div class="cat-sub">${items.length}件</div>
        </div>
        <div class="cat-total">${catTotal}g</div>
        <span class="material-icons-round cat-chevron">expand_more</span>
      </div>
      ${collapsed ? '' : `
      <div class="gear-list-wrap">
        ${items.map((g,idx) => `
          <div class="gear-row" style="animation-delay:${idx*30}ms">
            <div class="gear-row-body">
              <div class="gear-row-name">${g.name}</div>
              ${g.note ? `<div class="gear-row-note">${g.note}</div>` : ''}
            </div>
            <div class="gear-row-right">
              ${g.weight ? `<span class="weight-pill">${g.weight}g</span>` : ''}
              <div class="row-actions">
                <button class="sm-btn edit" onclick="openEdit(${g.id})">編集</button>
                <button class="sm-btn del" onclick="deleteGear(${g.id})">削除</button>
              </div>
            </div>
          </div>
        `).join('')}
      </div>`}
    </div>`;
  }).join('');
}

function toggleCat(cat) {
  if (collapsedCats.has(cat)) collapsedCats.delete(cat);
  else collapsedCats.add(cat);
  renderHome();
}

// ── Add / Delete / Edit ──
function addGear(gear) {
  gears.push({ id: Date.now(), ...gear });
  updateStats();
  renderHome();
}

function deleteGear(id) {
  const g = gears.find(x=>x.id===id);
  gears = gears.filter(x=>x.id!==id);
  checkedIds.delete(id);
  updateStats(); renderHome();
  if (g) snack(g.name+' を削除しました');
}

function openEdit(id) {
  const g = gears.find(x=>x.id===id);
  if (!g) return;
  document.getElementById('editId').value = id;
  const fields = { eName:g.name, eWeight:g.weight||'', eNote:g.note||'' };
  Object.entries(fields).forEach(([k,v]) => {
    const el = document.getElementById(k); el.value=v; tfInput(el);
  });
  const ec = document.getElementById('eCat'); ec.value=g.cat; tfInput(ec);
  document.getElementById('editScrim').classList.add('open');
}

function closeEdit() { document.getElementById('editScrim').classList.remove('open'); }

function saveEdit() {
  const id = parseInt(document.getElementById('editId').value);
  const g = gears.find(x=>x.id===id); if (!g) return;
  g.name = document.getElementById('eName').value.trim();
  g.cat  = document.getElementById('eCat').value;
  g.weight = parseInt(document.getElementById('eWeight').value)||0;
  g.note = document.getElementById('eNote').value.trim();
  closeEdit(); updateStats(); renderHome();
  snack('保存しました');
}

document.getElementById('editScrim').addEventListener('click', e => {
  if (e.target===document.getElementById('editScrim')) closeEdit();
});

// ── Trip ──
function renderTrip() {
  const container = document.getElementById('tripList');
  if (gears.length===0) {
    container.innerHTML = `<div class="empty-state"><span class="material-icons-round">hiking</span><p>ギアが登録されていません</p></div>`;
    updateTripWeight(); return;
  }
  const bycat = {};
  gears.forEach(g => { if(!bycat[g.cat]) bycat[g.cat]=[]; bycat[g.cat].push(g); });
  container.innerHTML = Object.entries(bycat).map(([cat,items]) => `
    <div class="check-card">
      <div class="check-cat-hdr">${CAT_ICONS[cat]||'📦'} ${CAT_LABELS[cat]||cat}</div>
      ${items.map(g => `
        <div class="check-row ${checkedIds.has(g.id)?'checked':''}" onclick="toggleCheck(${g.id})">
          <div class="checkbox"><span class="material-icons-round">check</span></div>
          <div class="check-name">${g.name}</div>
          <div class="check-wt">${g.weight?g.weight+'g':'—'}</div>
        </div>
      `).join('')}
    </div>
  `).join('');
  updateTripWeight();
}

function toggleCheck(id) {
  checkedIds.has(id) ? checkedIds.delete(id) : checkedIds.add(id);
  renderTrip();
}

function clearChecks() { checkedIds.clear(); renderTrip(); }

function updateTripWeight() {
  const checked = gears.filter(g=>checkedIds.has(g.id));
  const total = checked.reduce((s,g)=>s+g.weight,0);
  document.getElementById('tripTotalG').textContent = total;
  document.getElementById('tripTotalKg').textContent = total>0?`(${(total/1000).toFixed(2)} kg)`:'';
  const bd = {};
  checked.forEach(g => { if(!bd[g.cat]) bd[g.cat]=0; bd[g.cat]+=g.weight; });
  document.getElementById('breakdown').innerHTML = Object.entries(bd).length===0
    ? '<div style="color:var(--on-surface-v);font-size:13px">まだ選択されていません</div>'
    : Object.entries(bd).map(([c,w])=>`
        <div class="bd-chip">${CAT_ICONS[c]||'📦'} ${CAT_LABELS[c]||c} <span class="bd-wt">${w}g</span></div>
      `).join('');
}

// ── AI Predictive Search ──
let _debounce = null;
let _predictions = [];
let _focusedIdx = -1;
let _dropOpen = false;

function onInput(val) {
  clearTimeout(_debounce);
  if (val.trim().length < 2) { closeDrop(); setLeadIcon('auto_awesome'); return; }
  setLeadIcon('sync', true);
  _debounce = setTimeout(() => fetchPredictions(val.trim()), 380);
}

function onFocus() { if (_predictions.length>0) openDrop(); }
function onBlur() { setTimeout(closeDrop, 180); }

function onKeydown(e) {
  const items = document.querySelectorAll('.predict-item');
  if (e.key==='ArrowDown') { e.preventDefault(); _focusedIdx=Math.min(_focusedIdx+1,items.length-1); syncFocus(items); }
  else if (e.key==='ArrowUp') { e.preventDefault(); _focusedIdx=Math.max(_focusedIdx-1,-1); syncFocus(items); }
  else if (e.key==='Enter' && _focusedIdx>=0) selectPrediction(_focusedIdx);
  else if (e.key==='Escape') closeDrop();
}

function syncFocus(items) {
  items.forEach((el,i) => el.classList.toggle('focused', i===_focusedIdx));
  if (_focusedIdx>=0 && items[_focusedIdx]) items[_focusedIdx].scrollIntoView({block:'nearest'});
}

function setLeadIcon(name, spin=false) {
  const el = document.getElementById('searchLeadIcon');
  el.textContent = name;
  el.classList.toggle('spin-icon', spin);
  el.style.color = spin ? 'var(--primary)' : 'var(--primary)';
}

function openDrop() {
  _dropOpen = true;
  document.getElementById('searchRow').classList.add('open');
  document.getElementById('predictDrop').classList.add('open');
}

function closeDrop() {
  _dropOpen = false;
  _focusedIdx = -1;
  document.getElementById('searchRow').classList.remove('open');
  document.getElementById('predictDrop').classList.remove('open');
}

async function fetchPredictions(query) {
  const drop = document.getElementById('predictDrop');
  drop.innerHTML = [1,2,3].map(()=>`
    <div class="shimmer-row">
      <div class="shimmer" style="width:52px;height:52px;border-radius:10px;flex-shrink:0"></div>
      <div style="flex:1;display:flex;flex-direction:column;gap:6px">
        <div class="shimmer" style="height:13px;width:60%;border-radius:4px"></div>
        <div class="shimmer" style="height:11px;width:40%;border-radius:4px"></div>
      </div>
    </div>
  `).join('');
  openDrop();

  try {
    // Step 1: Get gear suggestions from AI
    const prompt = `あなたは登山・アウトドアギアの専門家です。
ユーザーが「${query}」と入力しています。
一致する可能性のある登山ギアを5件、予測変換として提案してください。

JSON配列のみ返してください（コードブロック不要）：
[{"name":"商品名（ブランド+モデル）","category":"カテゴリ英語キー","weight":重量g整数,"note":"特徴15文字以内"}]

categoryは必ずこの中から選んでください：Sleep, Cook, Backpack, Clothing, Footwear, Navigation, Safety, Food, Light, Other`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:800,
        messages:[{role:'user',content:prompt}]
      })
    });

    const data = await res.json();
    const raw = data.content.map(b=>b.text||'').join('');
    _predictions = JSON.parse(raw.replace(/```json|```/g,'').trim());
    _focusedIdx = -1;

    function hl(str, q) {
      const i = str.toLowerCase().indexOf(q.toLowerCase());
      if (i<0) return str;
      return str.slice(0,i)+`<span class="hl">${str.slice(i,i+q.length)}</span>`+str.slice(i+q.length);
    }

    // Step 2: Render items immediately with emoji placeholders
    drop.innerHTML = _predictions.map((s,i) => `
      <div class="predict-item" id="pi${i}" onclick="selectPrediction(${i})">
        <div class="p-icon shimmer" id="pimg${i}">${CAT_ICONS[s.category]||'📦'}</div>
        <div class="p-body">
          <div class="p-name">${hl(s.name, query)}</div>
          <div class="p-chips">
            <span class="p-chip">${CAT_LABELS[s.category]||s.category}</span>
            <span class="p-chip"><span class="material-icons-round">monitor_weight</span>${s.weight}g</span>
            ${s.note?`<span class="p-chip">${s.note}</span>`:''}
          </div>
        </div>
        <button class="p-add" id="pa${i}" onclick="event.stopPropagation();quickAdd(${i})" title="即登録">
          <span class="material-icons-round">add</span>
        </button>
      </div>
    `).join('');

    // Step 3: Fetch images in parallel for each item
    _predictions.forEach((s, i) => fetchItemImage(s.name, i));

  } catch(e) {
    drop.innerHTML = `<div style="padding:16px;text-align:center;color:var(--on-surface-v);font-size:13px">
      <span class="material-icons-round" style="display:block;font-size:28px;color:var(--outline-v);margin-bottom:6px">wifi_off</span>
      取得できませんでした
    </div>`;
  }
  setLeadIcon('auto_awesome');
}

async function fetchItemImage(productName, idx) {
  try {
    const imgPrompt = `Search for a product image of "${productName}" outdoor/hiking gear. Return ONLY a JSON object with one field "imageUrl" containing a direct image URL (jpg/png/webp) from the search results. No explanation, just JSON: {"imageUrl":"https://..."}`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:300,
        tools:[{"type":"web_search_20250305","name":"web_search"}],
        messages:[{role:'user',content:imgPrompt}]
      })
    });

    const data = await res.json();
    const text = data.content.map(b=>b.text||'').join('');
    const clean = text.replace(/```json|```/g,'').trim();
    const match = clean.match(/"imageUrl"\s*:\s*"([^"]+)"/);
    if (!match) return;

    const url = match[1];
    const iconEl = document.getElementById('pimg'+idx);
    if (!iconEl) return;

    // Test image loads before showing
    const img = new Image();
    img.onload = () => {
      iconEl.classList.remove('shimmer');
      iconEl.innerHTML = `<img src="${url}" alt="" loading="lazy">`;
    };
    img.onerror = () => {
      iconEl.classList.remove('shimmer');
    };
    img.src = url;

  } catch(e) {
    const iconEl = document.getElementById('pimg'+idx);
    if (iconEl) iconEl.classList.remove('shimmer');
  }
}

function selectPrediction(i) {
  const s = _predictions[i]; if (!s) return;
  closeDrop();
  document.getElementById('searchInput').value = '';
  // Normalize category
  const cat = CAT_MAP[s.category] || s.category;
  addGear({ name:s.name, cat, weight:s.weight, note:s.note||'' });
  snack('✓ '+s.name+' を登録しました');
}

function quickAdd(i) {
  const s = _predictions[i]; if (!s) return;
  const cat = CAT_MAP[s.category] || s.category;
  addGear({ name:s.name, cat, weight:s.weight, note:s.note||'' });
  const btn = document.getElementById('pa'+i);
  const item = document.getElementById('pi'+i);
  if (btn) { btn.innerHTML='<span class="material-icons-round">check</span>'; btn.classList.add('done'); }
  if (item) item.classList.add('added');
  snack('✓ '+s.name+' を登録しました');
}

// ── Snackbar ──
function snack(msg) {
  const el = document.getElementById('snackbar');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2800);
}

// init
updateStats();
renderHome();
</script>
</body>
</html>
